name: fitsnap_ai
description: AI-powered health assistant for food calorie detection and step tracking.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  http: ^1.1.0
  dio: ^5.3.3
  image_picker: ^1.0.4
  camera: ^0.10.5+5
  pedometer: ^4.0.1
  shared_preferences: ^2.2.1
  intl: ^0.18.1
  fl_chart: ^0.63.0
  permission_handler: ^11.0.1
  path_provider: ^2.1.1
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
