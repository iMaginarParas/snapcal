name: FitSnap CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
    
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: fitsnap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests with pytest
        run: |
          cd backend
          pytest

      - name: Run database migrations (Dry Run Check)
        run: |
          cd backend
          alembic upgrade head
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/fitsnap_test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Trigger Railway Deployment Webhook
        run: |
          curl -X POST ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}

      - name: Health Check
        run: |
          sleep 10
          curl -f https://fitsnap-production.up.railway.app/health || (echo "Deployment health check failed" && exit 1)
